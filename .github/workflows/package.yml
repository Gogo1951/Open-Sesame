name: Package and release
on:
  push:
    tags:
      - "**"
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Clone project
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - name: Package and release
        uses: BigWigsMods/packager@v2
      - name: Install yq
        uses: mikefarah/yq@v4
      - name: Update vendored libraries from .pkgmeta
        run: |
          yq e '.externals | to_entries[] | .key + "|" + .value.url' .pkgmeta | while IFS='|' read -r path url; do
            rm -rf "$path"
            if [[ "$url" == *"curseforge.com"* ]]; then
              svn export --force "$url" "$path"
            else
              git clone --depth 1 "$url" "$path"
              rm -rf "$path/.git"
            fi
          done
      - name: Commit updated libraries
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Includes/
          git diff --staged --quiet || git commit -m "Update vendored libraries for $(git describe --tags --abbrev=0)"
          git push origin "$BRANCH"
